<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Payment Gateway API">
  <defs>
    <radialGradient id="glow" cx="82%" cy="-5%" r="95%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f4f4f5" stroke-opacity="0.04"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="#0b0b10"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- Ventana de terminal -->
  <g font-family="ui-monospace, 'Cascadia Code', Consolas, monospace">
    <rect x="620" y="120" width="460" height="300" rx="16" fill="#101014" stroke="#26262e"/>
    <circle cx="652" cy="152" r="6" fill="#f87171"/>
    <circle cx="676" cy="152" r="6" fill="#fbbf24"/>
    <circle cx="700" cy="152" r="6" fill="#34d399"/>
    <text x="652" y="205" font-size="19" fill="#a1a1aa">POST /api/transactions</text>
    <text x="652" y="240" font-size="19" fill="#34d399">201 Created</text>
    <text x="652" y="290" font-size="19" fill="#a1a1aa">stripe.webhook</text>
    <text x="652" y="325" font-size="19" fill="#a5b4fc">signature: verified ✓</text>
    <text x="652" y="375" font-size="19" fill="#a1a1aa">state: pending → completed</text>
  </g>

  <!-- Máquina de estados -->
  <g font-family="ui-monospace, Consolas, monospace" font-size="17">
    <circle cx="140" cy="470" r="8" fill="#fbbf24"/>
    <text x="160" y="476" fill="#a1a1aa">pending</text>
    <line x1="262" y1="470" x2="330" y2="470" stroke="#26262e" stroke-width="2"/>
    <circle cx="350" cy="470" r="8" fill="#818cf8"/>
    <text x="370" y="476" fill="#a1a1aa">processing</text>
    <line x1="510" y1="470" x2="578" y2="470" stroke="#26262e" stroke-width="2"/>
    <circle cx="598" cy="470" r="8" fill="#34d399"/>
    <text x="618" y="476" fill="#a1a1aa">completed</text>
  </g>

  <!-- Título -->
  <text x="120" y="180" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" fill="#71717a">BACKEND · API REST</text>
  <text x="118" y="250" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="58" font-weight="650" fill="#f4f4f5">Payment Gateway</text>
  <text x="118" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="58" font-weight="650" fill="url(#accent)">API</text>

  <text x="120" y="580" font-family="ui-monospace, Consolas, monospace" font-size="20" fill="#71717a">Django REST Framework · Stripe · Webhooks HMAC</text>
</svg>
