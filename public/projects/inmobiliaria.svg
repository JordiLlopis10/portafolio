<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Plataforma Inmobiliaria — en desarrollo">
  <defs>
    <radialGradient id="glow" cx="82%" cy="-5%" r="95%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f4f4f5" stroke-opacity="0.04"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="#0b0b10"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- Edificios: uno terminado, otro en construcción (trazo discontinuo) -->
  <g>
    <rect x="700" y="200" width="150" height="260" rx="10" fill="#101014" stroke="#26262e"/>
    <g fill="#38bdf8" fill-opacity="0.75">
      <rect x="724" y="228" width="26" height="26" rx="4"/>
      <rect x="762" y="228" width="26" height="26" rx="4"/>
      <rect x="800" y="228" width="26" height="26" rx="4"/>
      <rect x="724" y="268" width="26" height="26" rx="4"/>
      <rect x="800" y="268" width="26" height="26" rx="4"/>
      <rect x="724" y="308" width="26" height="26" rx="4"/>
      <rect x="762" y="308" width="26" height="26" rx="4"/>
      <rect x="724" y="348" width="26" height="26" rx="4"/>
      <rect x="762" y="388" width="26" height="26" rx="4"/>
    </g>
    <rect x="880" y="260" width="150" height="200" rx="10" fill="#101014" stroke="#38bdf8" stroke-opacity="0.6" stroke-dasharray="10 8"/>
    <g fill="none" stroke="#26262e" stroke-width="2">
      <rect x="904" y="288" width="26" height="26" rx="4"/>
      <rect x="942" y="288" width="26" height="26" rx="4"/>
      <rect x="980" y="288" width="26" height="26" rx="4"/>
      <rect x="904" y="328" width="26" height="26" rx="4"/>
      <rect x="942" y="328" width="26" height="26" rx="4"/>
    </g>
    <line x1="660" y1="460" x2="1070" y2="460" stroke="#26262e" stroke-width="2"/>
    <!-- grúa minimalista -->
    <line x1="1005" y1="260" x2="1005" y2="180" stroke="#71717a" stroke-width="3"/>
    <line x1="1005" y1="180" x2="920" y2="180" stroke="#71717a" stroke-width="3"/>
    <line x1="932" y1="180" x2="932" y2="212" stroke="#71717a" stroke-width="2"/>
    <rect x="922" y="212" width="20" height="14" rx="3" fill="none" stroke="#38bdf8" stroke-width="2"/>
  </g>

  <!-- Filtros de búsqueda -->
  <g font-family="ui-monospace, Consolas, monospace" font-size="17">
    <rect x="700" y="500" width="120" height="40" rx="20" fill="#101014" stroke="#26262e"/>
    <text x="760" y="525" text-anchor="middle" fill="#a1a1aa">zona</text>
    <rect x="832" y="500" width="120" height="40" rx="20" fill="#101014" stroke="#26262e"/>
    <text x="892" y="525" text-anchor="middle" fill="#a1a1aa">precio</text>
    <rect x="964" y="500" width="106" height="40" rx="20" fill="#101014" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="1017" y="525" text-anchor="middle" fill="#7dd3fc">tipo</text>
  </g>

  <!-- Título -->
  <text x="120" y="180" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" fill="#71717a">FULL-STACK · EN DESARROLLO</text>
  <text x="118" y="250" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="58" font-weight="650" fill="#f4f4f5">TheBestHome</text>
  <text x="118" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="58" font-weight="650" fill="url(#accent)">Inmobiliaria</text>

  <text x="120" y="580" font-family="ui-monospace, Consolas, monospace" font-size="20" fill="#71717a">Django 5 · PostgreSQL · Celery · CRM · 5 idiomas</text>
